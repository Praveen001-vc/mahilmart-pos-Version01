{% extends "base.html" %}

{% block content %}
<div class="page-section form-page">
  <div class="form-wrap">

<div class="container mt-4" style="max-width: 500px;">
    <div class="card p-4 shadow-sm">
        <h3>Edit User</h3>

        <form method="POST">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" value="{{ user.username }}" class="form-control">

            <label class="mt-3">Email</label>
            <input type="email" name="email" value="{{ user.email }}" class="form-control">

            <label class="mt-3">New Password (optional)</label>
            <input type="password" name="password" class="form-control">

            <label class="mt-3"><input type="checkbox" name="is_staff" {% if user.is_staff %}checked{% endif %}> Staff</label><br>
            <label><input type="checkbox" name="is_superuser" {% if user.is_superuser %}checked{% endif %}> Admin</label>

            <!-- GROUP DROPDOWN -->
            <label class="mt-3">Group</label>
            <select name="group" class="form-control">
                {% for g in groups %}
                    <option value="{{ g.id }}"
                        {% if g.id == current_group_id %}selected{% endif %}>
                        {{ g.name }}
                    </option>
                {% endfor %}
            </select>

            <button class="btn btn-primary mt-4 w-100">Save Changes</button>
        </form>
    </div>
</div>


  </div>
</div>
{% endblock %}
