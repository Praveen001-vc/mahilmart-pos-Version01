<div class="modal fade" id="brandModal" tabindex="-1" aria-labelledby="brandModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="brandModalLabel">Add Brand</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="post" action="{% url 'brand_creation' %}" id="brandModalForm" novalidate>
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" for="brand_name">Brand Name</label>
            <input type="text" id="brand_name" name="brand_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="alias_name">Alias Name</label>
            <input type="text" id="alias_name" name="alias_name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label" for="under">Under</label>
            <input type="text" id="under" name="under" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label" for="print_name">Print Name</label>
            <input type="text" id="print_name" name="print_name" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Brand</button>
        </div>
      </form>
    </div>
  </div>
</div>
