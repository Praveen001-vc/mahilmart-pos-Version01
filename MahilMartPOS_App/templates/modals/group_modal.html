<div class="modal fade" id="groupModal" tabindex="-1" aria-labelledby="groupModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="groupModalLabel">Add Group</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="post" action="{% url 'group_creation' %}" id="groupModalForm" novalidate>
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" for="group_name">Group Name</label>
            <input type="text" id="group_name" name="group_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="alias_name">Alias Name</label>
            <input type="text" id="alias_name" name="alias_name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label" for="print_name">Print Name</label>
            <input type="text" id="print_name" name="print_name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Under (Parent)</label>
            <select name="under" class="form-select">
              <option value="">-- None --</option>
              {% for g in groups %}
                <option value="{{ g.id }}">{{ g.group_name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Group</button>
        </div>
      </form>
    </div>
  </div>
</div>
