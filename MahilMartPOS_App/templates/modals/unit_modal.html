<div class="modal fade" id="unitModal" tabindex="-1" aria-labelledby="unitModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="unitModalLabel">Add Unit</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form method="post" action="{% url 'unit_creation' %}" id="unitForm" novalidate>
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" for="unit_name">Unit Name</label>
            <input type="text" id="unit_name" name="unit_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="print_name">Print Name</label>
            <input type="text" id="print_name" name="print_name" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label" for="decimals">Decimals</label>
            <input type="number" id="decimals" step="0.01" name="decimals" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label" for="UQC">UQC</label>
            <input type="text" id="UQC" name="UQC" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Unit</button>
        </div>
      </form>
    </div>
  </div>
</div>
