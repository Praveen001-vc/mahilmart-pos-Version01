{% for user in users %}
<tr class="{% if user.is_superuser %}superuser-row{% elif user.is_staff %}staff-row{% endif %}">
    <td>{{ user.id }}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.is_superuser|yesno:"Yes,No" }}</td>
    <td>{{ user.is_staff|yesno:"Yes,No" }}</td>
    <td>{{ user.is_active|yesno:"Yes,No" }}</td>
    <td>
        <a href="{% url 'edit_user' user.id %}" class="action-btn edit-btn">✏️ Edit</a>
        <a href="{% url 'delete_user' user.id %}" class="action-btn delete-btn"
           onclick="return confirm('Are you sure you want to delete this user?');">
           🗑 Delete
        </a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="7" class="text-center">No users found.</td>
</tr>
{% endfor %}
